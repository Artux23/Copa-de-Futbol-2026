<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa de Fútbol 
      2026</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
  
    <style>
        :root {
            --primary: #8a1538;
            --primary-light: #b2224d;
            --secondary: #0b0d13;
            --accent: #d4af37;
            --light: #ffffff;
            --dark: #ffffff;
            --card-bg: rgba(11, 13, 19, 0.94);
            --border: rgba(255, 255, 255, 0.15);
            --success: #198754;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(90deg, #11381b 50%, #164222 50%);
            background-size: 80px 100%;
            background-attachment: fixed;
            color: var(--dark);
            line-height: 1.4;
            padding-bottom: 75px;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1001;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .ticker-wrap {
            background-color: var(--secondary);
            color: var(--accent);
            padding: 6px 0;
            overflow: hidden;
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 25s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .nav-tabs {
            display: flex;
            background-color: rgba(11, 13, 19, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow-x: auto;
            scrollbar-width: none;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        .nav-tabs::-webkit-scrollbar { display: none; }

        .nav-btn {
            background: none;
            border: none;
            color: #b0b5bc;
            padding: 14px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
        }

        .nav-btn.active {
            color: white;
            background-color: rgba(255,255,255,0.05);
            border-bottom: 3px solid var(--accent);
        }

        .main-container {
            max-width: 650px;
            margin: 15px auto;
            padding: 0 12px;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        .match-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 700;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
        }

        .match-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .team-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2px;
            min-width: 0;
        }

        .team-name {
            font-size: 0.85rem;
            font-weight: 800;
            color: #ffffff;
            white-space: normal;
            word-wrap: break-word;
            display: block;
            width: 100%;
            margin-top: 4px;
            line-height: 1.2;
        }

        .team-origin {
            display: block;
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: bold;
            margin-top: 2px;
            background: rgba(214, 175, 55, 0.15);
            padding: 1px 5px;
            border-radius: 4px;
        }

        .team-flag {
            font-size: 1.6rem;
            display: inline-block;
            line-height: 1;
            flex-shrink: 0;
        }

        .score-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin: 0 10px;
        }

        .score-input {
            width: 38px;
            height: 38px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
        }

        .score-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
        }

        .vs-text {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            margin: 0 6px;
        }

        .group-title {
            background-color: var(--primary);
            color: white;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px 8px 0 0;
            margin-top: 25px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .table-responsive {
            overflow-x: auto;
            background: rgba(11, 13, 19, 0.95);
            border-radius: 0 0 8px 8px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 0.82rem;
        }

        th {
            background-color: rgba(255, 255, 255, 0.04);
            color: var(--accent);
            font-weight: 700;
            padding: 10px 6px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 10px 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-weight: 600;
            color: white;
        }

        tr.highlight-row td { background-color: rgba(255, 255, 255, 0.05); }
        td.team-name-cell { text-align: left; font-weight: 700; white-space: nowrap; }

        /* --- ESTILOS COMPONENTES DE PERFIL --- */
        .profile-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
        }

        .avatar-container {
            position: relative;
            width: 95px;
            height: 95px;
            margin: 0 auto 12px auto;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            background-color: rgba(255,255,255,0.08);
        }

        .file-label {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--accent);
            color: var(--secondary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .profile-name-display {
            font-size: 1.2rem;
            font-weight: 800;
            color: white;
            margin-bottom: 12px;
        }

        .profile-info-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-info-text strong {
            color: var(--accent);
        }

        .inline-flag-display {
            font-size: 1.6rem;
            line-height: 1;
        }

        .btn-profile-action {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 14px;
            text-transform: uppercase;
            transition: background-color 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        .btn-profile-action:active { background-color: var(--primary-light); }

        .edit-form-container {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            text-align: left;
        }

        .edit-form-container.open { display: block; }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .profile-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .profile-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        select.profile-input option {
            background-color: #1a1d24;
            color: white;
        }

        /* --- BOTÓN COMPARTIR UNIFICADO --- */
        .social-share-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .btn-trigger-share {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-trigger-share:active { filter: brightness(0.9); }

        /* --- MODAL HOJA DE COMPARTIR (ACTION SHEET) --- */
        .share-modal-overlay {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: flex-end;
        }

        .share-modal-overlay.open { display: flex; }

        .share-modal-sheet {
            background-color: #161920;
            width: 100%;
            max-width: 600px;
            border-radius: 16px 16px 0 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            border-top: 2px solid var(--accent);
            animation: slideUp 0.25s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .share-modal-sheet h3 {
            font-size: 1rem;
            color: white;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .share-networks-list {
            list-style: none;
            padding: 0;
            margin-bottom: 15px;
        }

        .share-networks-list li {
            margin-bottom: 10px;
        }

        .share-network-item {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            background-color: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            transition: background 0.2s;
        }

        .share-network-item:active {
            background-color: rgba(255,255,255,0.15);
        }

        .network-brand-icon {
            width: 26px;
            height: 26px;
            object-fit: contain;
        }

        .btn-modal-close {
            background-color: #343a40;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-modal-close:active { background-color: #23272b; }

        .marketplace-box { margin-top: 15px; }
        .btn-download-app {
            background: linear-gradient(135deg, #11381b, #198754);
            color: white;
            border: 1px solid var(--accent);
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-download-app:active { filter: brightness(1.2); }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: var(--secondary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 3px solid var(--primary);
            z-index: 1000;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.4);
        }

        .bottom-btn {
            background: none;
            border: none;
            color: #a0a5bc;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            width: 33.33%;
        }

        .bottom-btn.active { color: var(--accent); }
        .bottom-btn span.icon { font-size: 1.3rem; margin-bottom: 2px; }
    </style>
</head>

    <header>
        <h1>COPA DE FÚTBOL 2026</h1>
    </header>

    <div class="ticker-wrap">
        <div class="ticker" id="ticker-text">⚽ Cargando motor deportivo... ⚽</div>
    </div>

    <div id="section-calendario" class="view-section active">
        <div class="nav-tabs">
            <button class="nav-btn active" onclick="filterPhase('g-todos')">Todos</button>
            <button class="nav-btn" onclick="filterPhase('g-j1')">Jornada 1</button>
            <button class="nav-btn" onclick="filterPhase('g-j2')">Jornada 2</button>
            <button class="nav-btn" onclick="filterPhase('g-j3')">Jornada 3</button>
            <button class="nav-btn" onclick="filterPhase('g-el')">Eliminatorias</button>
        </div>
        <div class="main-container" id="matches-list-container"></div>
    </div>

    <div id="section-tablas" class="view-section">
        <div class="main-container">
            <div class="nav-tabs" style="position:static; margin-bottom:15px; border-radius:8px;">
                <button id="tab-sub-grupos" class="nav-btn active" onclick="switchTableSubTab('grupos')" style="width:50%;">Grupos (A - L)</button>
                <button id="tab-sub-terceros" class="nav-btn" onclick="switchTableSubTab('terceros')" style="width:50%;">Mejores Terceros</button>
            </div>
            <div id="sub-container-grupos"></div>
            <div id="sub-container-terceros" style="display:none;"></div>
        </div>
    </div>

    <div id="section-perfil" class="view-section">
        <div class="main-container">
            <div class="profile-card">
                
                <div class="avatar-container">
                    <img id="user-avatar" class="avatar-img" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238a1538'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>" alt="Avatar">
                    <label class="file-label" for="avatar-uploader">📷</label>
                    <input type="file" id="avatar-uploader" style="display: none;" accept="image/*" onchange="uploadAvatar()">
                </div>

                <div id="profile-view-mode">
                    <div id="lbl-display-username" class="profile-name-display">Usuario Mundialista</div>
                    <div class="profile-info-text">Nacionalidad: <span id="lbl-display-nacion" class="inline-flag-display">❓</span></div>
                    <div class="profile-info-text">Equipo Favorito: <span id="lbl-display-favorito" class="inline-flag-display">❓</span></div>
                    <div class="profile-info-text">Mi Campeón 2026: <span id="lbl-display-campeon" class="inline-flag-display">❓</span></div>
                    <button class="btn-profile-action" onclick="toggleEditProfile(true)">⚙️ Editar Configuración</button>
                </div>

                <div id="profile-edit-mode" class="edit-form-container">
                    <div class="form-group">
                        <label>Nombre de Usuario</label>
                        <input type="text" id="input-edit-username" class="profile-input" placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Nacionalidad</label>
                        <select id="input-edit-nacion" class="profile-input"></select>
                    </div>
                    <div class="form-group">
                        <label>Equipo Favorito</label>
                        <select id="input-edit-favorito" class="profile-input"></select>
                    </div>
                    <div class="form-group">
                        <label>Pronóstico de Campeón</label>
                        <select id="input-edit-campeon" class="profile-input"></select>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:14px;">
                        <button class="btn-profile-action" style="background-color:var(--success); width:50%; margin:0;" onclick="saveProfileData()">Guardar</button>
                        <button class="btn-profile-action" style="background-color:#6c757d; width:50%; margin:0;" onclick="toggleEditProfile(false)">Cancelar</button>
                    </div>
                </div>

                <div class="social-share-section">
                    <button class="btn-trigger-share" onclick="toggleShareModal(true)">🔗 Compartir Resultados</button>
                </div>

                <div class="marketplace-box">
                    <button class="btn-download-app" onclick="goToMarketplace()">📥 Descargar App Completa</button>
                </div>

            </div>
        </div>
    </div>

    <div id="share-modal" class="share-modal-overlay" onclick="closeModalOnOuterClick(event)">
        <div class="share-modal-sheet">
            <h3>Compartir mi progreso en:</h3>
            <ul class="share-networks-list">
                <li>
                    <a href="https://www.facebook.com/login" target="_blank" class="share-network-item" onclick="executeShareAction('Facebook')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" class="network-brand-icon" alt="FB">
                        Facebook
                    </a>
                </li>
                <li>
                    <a href="https://www.instagram.com" target="_blank" class="share-network-item" onclick="executeShareAction('Instagram')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" class="network-brand-icon" alt="IG">
                        Instagram
                    </a>
                </li>
                <li>
                    <a href="https://x.com/i/flow/login" target="_blank" class="share-network-item" onclick="executeShareAction('X')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023.svg" class="network-brand-icon" alt="X">
                        X / Twitter
                    </a>
                </li>
                <li>
                    <a href="https://www.whatsapp.com" target="_blank" class="share-network-item" onclick="executeShareAction('WhatsApp')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="network-brand-icon" alt="WA">
                        WhatsApp
                    </a>
                </li>
            </ul>
            <button class="btn-modal-close" onclick="toggleShareModal(false)">Cerrar</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="bottom-btn active" id="btn-nav-cal" onclick="changeMainSection('calendario')">
            <span class="icon">📅</span>Calendario
        </button>
        <button class="bottom-btn" id="btn-nav-tab" onclick="changeMainSection('tablas')">
            <span class="icon">📊</span>Posiciones
        </button>
        <button class="bottom-btn" id="btn-nav-per" onclick="changeMainSection('perfil')">
            <span class="icon">👤</span>Mi Perfil
        </button>
    </div>

        function parseScore(val) {
            if (val === null || val === undefined || val === "") return NaN;
            let parsed = parseInt(val, 10);
            return isNaN(parsed) ? NaN : parsed;
        }

        function calcularDatosDeTorneo() {
            const gruposIds = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
            let clasificadosPorGrupo = {};

            gruposIds.forEach(g => {
                let estructuraEquipos = {};
                partidosFaseGrupos.filter(p => p.grupo === g).forEach(p => {
                    if (!estructuraEquipos[p.local]) estructuraEquipos[p.local] = { nombre: p.local, bandera: p.banderaLocal, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0, grupo: g, duelos: [] };
                    if (!estructuraEquipos[p.visitante]) estructuraEquipos[p.visitante] = { nombre: p.visitante, bandera: p.banderaVisitante, pj: 0, pg: 0, pe: 0, pp: 0, gf: 0, gc: 0, dg: 0, pts: 0, grupo: g, duelos: [] };
                });

                partidosFaseGrupos.filter(p => p.grupo === g).forEach(p => {
                    const golesL = parseScore(localStorage.getItem(`juego_${p.juego}_local`));
                    const golesV = parseScore(localStorage.getItem(`juego_${p.juego}_visit`));

                    if (!isNaN(golesL) && !isNaN(golesV)) {
                        estructuraEquipos[p.local].pj++;
                        estructuraEquipos[p.visitante].pj++;
                        estructuraEquipos[p.local].gf += golesL;
                        estructuraEquipos[p.local].gc += golesV;
                        estructuraEquipos[p.visitante].gf += golesV;
                        estructuraEquipos[p.visitante].gc += golesL;

                        estructuraEquipos[p.local].duelos.push({ rival: p.visitante, gf: golesL, gc: golesV });
                        estructuraEquipos[p.visitante].duelos.push({ rival: p.local, gf: golesV, gc: golesL });

                        if (golesL > golesV) {
                            estructuraEquipos[p.local].pg++;
                            estructuraEquipos[p.local].pts += 3;
                            estructuraEquipos[p.visitante].pp++;
                        } else if (golesL < golesV) {
                            estructuraEquipos[p.visitante].pg++;
                            estructuraEquipos[p.visitante].pts += 3;
                            estructuraEquipos[p.local].pp++;
                        } else {
                            estructuraEquipos[p.local].pe++;
                            estructuraEquipos[p.local].pts += 1;
                            estructuraEquipos[p.visitante].pe++;
                            estructuraEquipos[p.visitante].pts += 1;
                        }
                    }
                });

                let listaEquipos = Object.values(estructuraEquipos).map(eq => {
                    eq.dg = eq.gf - eq.gc;
                    return eq;
                });

                listaEquipos.sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    let contra = a.duelos.find(d => d.rival === b.nombre);
                    if (contra) {
                        if (contra.gf > contra.gc) return -1;
                        if (contra.gf < contra.gc) return 1;
                    }
                    if (b.dg !== a.dg) return b.dg - a.dg;
                    if (b.gf !== a.gf) return b.gf - a.gf;
                    return 0;
                });

                clasificadosPorGrupo[g] = listaEquipos;
            });

            let todosLosTerceros = [];
            gruposIds.forEach(g => {
                if(clasificadosPorGrupo[g] && clasificadosPorGrupo[g].length >= 3) {
                    todosLosTerceros.push(clasificadosPorGrupo[g][2]);
                }
            });

            todosLosTerceros.sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.dg !== a.dg) return b.dg - a.dg;
                if (b.gf !== a.gf) return b.gf - a.gf;
                return 0;
            });

            return {
                grupos: clasificadosPorGrupo,
                tercerosTodos: todosLosTerceros,
                terceros8Clasificados: todosLosTerceros.slice(0, 8)
            };
        }

        function obtenerCrucesDieciseisavosDinamicos(datos) {
            let mapaCruces = {};
            const gruposIds = ["A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L"];
            
            gruposIds.forEach(g => {
                const arr = datos.grupos[g];
                mapaCruces[`1${g}`] = arr[0] && arr[0].pj > 0 ? { nombre: arr[0].nombre, bandera: arr[0].bandera, procedencia: `1.° ${g}` } : null;
                mapaCruces[`2${g}`] = arr[1] && arr[1].pj > 0 ? { nombre: arr[1].nombre, bandera: arr[1].bandera, procedencia: `2.° ${g}` } : null;
            });

            const llavesTerceros = ["3ABCDF", "3CDFGH", "3BEFIJ", "3AEHIJ", "3CEFHI", "3EHIJK", "3EFGIJ", "3DEIJL"];
            llavesTerceros.forEach(k => mapaCruces[k] = null);

            let tList = datos.terceros8Clasificados.filter(x => x.pj > 0).sort((a,b) => a.grupo.localeCompare(b.grupo));
            
            tList.forEach(terceroEquipo => {
                let indiceTerceroGral = datos.tercerosTodos.findIndex(x => x.nombre === terceroEquipo.nombre);
                let numClasifTercero = indiceTerceroGral !== -1 ? (indiceTerceroGral + 1) : 3;

                let colocado = false;
                for(let slot of llavesTerceros) {
                    if(slot.includes(terceroEquipo.grupo) && !mapaCruces[slot]) {
                        mapaCruces[slot] = { nombre: terceroEquipo.nombre, bandera: terceroEquipo.bandera, procedencia: `3.° ${terceroEquipo.grupo} (#${numClasifTercero} T)` };
                        colocado = true;
                        break;
                    }
                }
                if(!colocado) {
                    for(let slot of llavesTerceros) {
                        if(!mapaCruces[slot]) {
                            mapaCruces[slot] = { nombre: terceroEquipo.nombre, bandera: terceroEquipo.bandera, procedencia: `3.° ${terceroEquipo.grupo} (#${numClasifTercero} T)` };
                            break;
                        }
                    }
                }
            });

            return mapaCruces;
        }

        function renderMatches() {
            const container = document.getElementById('matches-list-container');
            container.innerHTML = "";

            if (currentFilter === 'g-el') {
                const datosTorneo = calcularDatosDeTorneo();
                const mapeoEquipos = obtenerCrucesDieciseisavosDinamicos(datosTorneo);
                let memoriaResultadosEliminatorias = {};

                partidosEliminatoriasEstaticos.forEach(partido => {
                    let localCalculado = { nombre: "", bandera: "🏳️", procedencia: "" };
                    let visitanteCalculado = { nombre: "", bandera: "🏳️", procedencia: "" };

                    if(partido.etapa === "16avos") {
                        let lData = mapeoEquipos[partido.claveL];
                        let vData = mapeoEquipos[partido.claveV];
                        if(lData) localCalculado = lData; else localCalculado = { nombre: partido.defaultL, bandera: "🏳️", procedencia: partido.claveL };
                        if(vData) visitanteCalculado = vData; else visitanteCalculado = { nombre: partido.defaultV, bandera: "🏳️", procedencia: partido.claveV };
                    } else {
                        let scoreL = parseScore(localStorage.getItem(`juego_${partido.deL}_local`));
                        let scoreV = parseScore(localStorage.getItem(`juego_${partido.deL}_visit`));
                        
                        if(!isNaN(scoreL) && !isNaN(scoreV)) {
                            let itemG = (scoreL >= scoreV) ? memoriaResultadosEliminatorias[partido.deL]?.L : memoriaResultadosEliminatorias[partido.deL]?.V;
                            if(partido.perdedores) {
                                itemG = (scoreL < scoreV) ? memoriaResultadosEliminatorias[partido.deL]?.L : memoriaResultadosEliminatorias[partido.deL]?.V;
                            }
                            if(itemG && itemG.nombre) localCalculado = { nombre: itemG.nombre, bandera: itemG.bandera, procedencia: `${partido.perdedores ? 'Perd.' : 'Gan.'} J${partido.deL}` };
                            else localCalculado = { nombre: `Ganador J${partido.deL}`, bandera: "🏳️", procedencia: "" };
                        } else {
                            localCalculado = { nombre: partido.perdedores ? `Perdedor J${partido.deL}` : `Ganador J${partido.deL}`, bandera: "🏳️", procedencia: "" };
                        }

                        let scoreL_v = parseScore(localStorage.getItem(`juego_${partido.deV}_local`));
                        let scoreV_v = parseScore(localStorage.getItem(`juego_${partido.deV}_visit`));
                        
                        if(!isNaN(scoreL_v) && !isNaN(scoreV_v)) {
                            let itemG = (scoreL_v >= scoreV_v) ? memoriaResultadosEliminatorias[partido.deV]?.L : memoriaResultadosEliminatorias[partido.deV]?.V;
                            if(partido.perdedores) {
                                itemG = (scoreL_v < scoreV_v) ? memoriaResultadosEliminatorias[partido.deV]?.L : memoriaResultadosEliminatorias[partido.deV]?.V;
                            }
                            if(itemG && itemG.nombre) visitanteCalculado = { nombre: itemG.nombre, bandera: itemG.bandera, procedencia: `${partido.perdedores ? 'Perd.' : 'Gan.'} J${partido.deV}` };
                            else visitanteCalculado = { nombre: `Ganador J${partido.deV}`, bandera: "🏳️", procedencia: "" };
                        } else {
                            visitanteCalculado = { nombre: partido.perdedores ? `Perdedor J${partido.deV}` : `Ganador J${partido.deV}`, bandera: "🏳️", procedencia: "" };
                        }
                    }

                    memoriaResultadosEliminatorias[partido.juego] = { L: localCalculado, V: visitanteCalculado };

                    const localKey = `juego_${partido.juego}_local`;
                    const visitKey = `juego_${partido.juego}_visit`;

                            </div>
                            <div class="score-container">
                                <input type="number" class="score-input" value="${valLocal}" onchange="updateScore('${localKey}', this.value)" min="0">
                                <span class="vs-text">VS</span>
                                <input type="number" class="score-input" value="${valVisit}" onchange="updateScore('${visitKey}', this.value)" min="0">
                            </div>
                            <div class="team-box">
                                <span class="team-flag">${visitanteCalculado.bandera}</span>
                                <span class="team-name">${visitanteCalculado.nombre}</span>
                                <span class="team-origin">${visitanteCalculado.procedencia || '—'}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else {
                let listadoAFiltrar = [];
                if (currentFilter === 'g-todos') listadoAFiltrar = partidosFaseGrupos;
                else if (currentFilter === 'g-j1') listadoAFiltrar = partidosFaseGrupos.filter(p => p.jornada === 1);

                listadoAFiltrar.forEach(partido => {
                    const localKey = `juego_${partido.juego}_local`;
                    const visitKey = `juego_${partido.juego}_visit`;

                document.getElementById('input-edit-favorito').value = localStorage.getItem('user_profile_favorito') || "";
                document.getElementById('input-edit-campeon').value = localStorage.getItem('user_profile_campeon') || "";
            } else {
                viewMode.style.display = "block";
                editMode.classList.remove('open');
            }
        }

        function saveProfileData() {
            const userVal = document.getElementById('input-edit-username').value.trim();
            const nacFlag = document.getElementById('input-edit-nacion').value;
            const favFlag = document.getElementById('input-edit-favorito').value;
            const camFlag = document.getElementById('input-edit-campeon').value;

            localStorage.setItem('user_profile_name', userVal || "Usuario Mundialista");
            localStorage.setItem('user_profile_nacion', nacFlag || "❓");
            localStorage.setItem('user_profile_favorito', favFlag || "❓");
            localStorage.setItem('user_profile_campeon', camFlag || "❓");

            toggleEditProfile(false);
            cargarDatosPerfilVisual();
        }

        function uploadAvatar() {
            const file = document.getElementById('avatar-uploader').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    localStorage.setItem('user_profile_avatar', reader.result);
                    document.getElementById('user-avatar').src = reader.result;
                }
                reader.readAsDataURL(file);
            }
        }

        /* --- MODAL DE COMPARTIR INTERACTIVO --- */
        function toggleShareModal(show) {
            const modal = document.getElementById('share-modal');
            if(show) modal.classList.add('open');
            else modal.classList.remove('open');
        }

        function closeModalOnOuterClick(e) {
            if(e.target.id === 'share-modal') toggleShareModal(false);
        }

        function executeShareAction(platform) {
            let conteo = 0;
            for (let i = 1; i <= 72; i++) {
                if (localStorage.getItem(`juego_${i}_local`) !== null) conteo++;
            }
            const txt = `🏆 ¡Mira mi Calendario del Mundial 2026! Ya completé los pronósticos de ${conteo}/72 partidos. ¿Quién es tu campeón? ⚽`;
            console.log(`Abriendo ventana de inicio de sesión para compartir en: ${platform}`);
            toggleShareModal(false);
        }

        function goToMarketplace() {
            alert("Redirigiendo de forma segura al Marketplace oficial...");
        }

        function actualizarTickerDinamico() {
            let conteo = 0;
            for (let i = 1; i <= 72; i++) {
                if (localStorage.getItem(`juego_${i}_local`) !== null) conteo++;
            }
            document.getElementById('ticker-text').innerText = `⚽ Has completado ${conteo} de 72 partidos de la Fase de Grupos • Tu árbol de Eliminatorias se calcula bajo regla oficial FIFA 2026 ⚽`;
        }

        window.onload = function() {
            renderMatches();
            actualizarTickerDinamico();
            cargarDatosPerfilVisual();
        };
    </script>
